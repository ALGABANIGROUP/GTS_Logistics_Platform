version: '3.8'

services:
  database-orchestrator:
    build: .
    container_name: database_orchestrator_bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - BATCH_FLUSH_INTERVAL=300
      - CACHE_TTL=300
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - db-network

  redis:
    image: redis:7-alpine
    container_name: db_cache_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - db-network

networks:
  db-network:
    driver: bridge

volumes:
  redis_data: