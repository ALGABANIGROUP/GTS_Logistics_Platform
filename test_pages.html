<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTS Profile Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }

        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <h1>GTS Profile & Settings Test</h1>

    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }

        // Test pages
        const pages = [
            { url: 'http://localhost:5173/profile', name: 'Profile Page' },
            { url: 'http://localhost:5173/settings', name: 'Settings Page' },
            { url: 'http://localhost:5173/emails', name: 'Emails Page' }
        ];

        pages.forEach(page => {
            fetch(page.url, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        addResult(`✅ ${page.name} is accessible (${response.status})`);
                    } else {
                        addResult(`❌ ${page.name} returned ${response.status}`, false);
                    }
                })
                .catch(error => {
                    addResult(`❌ ${page.name} failed: ${error.message}`, false);
                });
        });

        // Test glass theme
        setTimeout(() => {
            addResult('🎨 Glass theme should be applied to all pages');
            addResult('👤 Profile page should show user data (if logged in)');
            addResult('⚙️ Settings page should show system configuration');
            addResult('📧 Emails page should show email management');
        }, 1000);
    </script>
</body>

</html>
