# GTS Production Nginx Configuration
# Reverse Proxy with SSL/TLS, Load Balancing, and Performance Optimization

user www-data;
worker_processes auto;
pid /var/run/nginx.pid;

# Load dynamic modules
include /usr/share/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    server_tokens off;

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # File Type Mapping
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate Limiting (optional, GTS uses application-level rate limiting)
    # Uncomment if needed:
    # limit_req_zone $binary_remote_addr zone=gts_api:10m rate=60r/m;
    # limit_req_zone $binary_remote_addr zone=gts_general:10m rate=100r/m;

    # Cache Configuration
    proxy_cache_path /var/cache/nginx/gts levels=1:2 keys_zone=gts_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Upstream GTS Backend
    upstream gts_backend {
        # Round-robin load balancing between multiple app instances (if available)
        server localhost:8000 weight=1 max_fails=3 fail_timeout=30s;
        # Uncomment for multiple instances:
        # server localhost:8001 weight=1 max_fails=3 fail_timeout=30s;
        # server localhost:8002 weight=1 max_fails=3 fail_timeout=30s;

        # Keep connections alive to backend
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    # HTTP to HTTPS Redirect Server
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME Challenge for Let's Encrypt (keep for renewals)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS GTS Production Server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name gts.example.com;  # Replace with actual domain

        # SSL/TLS Configuration
        ssl_certificate /etc/letsencrypt/live/gts.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gts.example.com/privkey.pem;

        # SSL Protocol and Ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS (HTTP Strict-Transport-Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # Logging
        access_log /var/log/nginx/gts-access.log combined buffer=32k flush=1m;
        error_log /var/log/nginx/gts-error.log warn;

        # Health Check Endpoint (no logging)
        location /health {
            proxy_pass http://gts_backend;
            access_log off;
        }

        # Static Assets with Caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://gts_backend;
            proxy_cache gts_cache;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # API Endpoints
        location /api/ {
            # Rate limiting (uncomment if using)
            # limit_req zone=gts_api burst=20 nodelay;

            proxy_pass http://gts_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
        }

        # WebSocket Support for Real-time Features
        location /api/v1/ws/ {
            proxy_pass http://gts_backend;
            proxy_http_version 1.1;
            
            # WebSocket Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Timeouts (long-lived connections)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 60s;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Main Application
        location / {
            # Rate limiting (uncomment if using)
            # limit_req zone=gts_general burst=50 nodelay;

            proxy_pass http://gts_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
        }

        # Block suspicious requests
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # Rate Limiting Config (if needed)
    # Uncomment and adjust as needed:
    # limit_req_status 429;
    # limit_req_log_level warn;
}
