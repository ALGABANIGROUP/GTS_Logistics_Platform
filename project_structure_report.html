<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTS Project Structure Report</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-800 p-6 font-sans">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-blue-900 flex items-center">
        📦 GTS Project Structure Report
      </h1>
      <button onclick="window.open('./project_structure_report.html', '_blank')"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition">
        📂 Open Last Report
      </button>
    </div>

    <p class="text-sm text-gray-700 mb-4">
      Generated on: <strong>2025-04-24 23:54:40</strong> |
      Total Files: <strong>177</strong> |
      Total Size: <strong>510.21 KB</strong>
    </p>

    <div class="mb-4">
      <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 Search file name..."
        class="w-full px-3 py-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="overflow-auto rounded shadow bg-white">
      <table id="reportTable" class="min-w-full table-auto border-collapse">
        <thead class="bg-blue-900 text-white">
          <tr>
            <th class="text-left px-4 py-2 cursor-pointer" onclick="sortTable(0)">File Path ⬍</th>
            <th class="text-left px-4 py-2 cursor-pointer" onclick="sortTable(1)">Size (KB) ⬍</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Dynamic rows will be inserted here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const data = [
      ["backend/__init__.py", "0.0"],
      ["backend/ai_bots_backend.py", "0.35"],
      ["backend/ai_report_scheduler.py", "0.76"],
      ["backend/main.py", "2.64"],
      ["frontend/src/pages/Dashboard.jsx", "2.02"],
      ["frontend/src/pages/Login.jsx", "3.25"],
      // ... add more files according to the complete report
    ];

    function loadTable() {
      const tbody = document.getElementById("tableBody");
      data.forEach(([path, size]) => {
        const row = `<tr class="hover:bg-gray-100">
                      <td class="px-4 py-2 border-b">${path}</td>
                      <td class="px-4 py-2 border-b">${size}</td>
                    </tr>`;
        tbody.insertAdjacentHTML("beforeend", row);
      });
    }

    function searchTable() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#reportTable tbody tr");
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
      });
    }

    function sortTable(colIndex) {
      const table = document.getElementById("reportTable");
      const rows = Array.from(table.rows).slice(1);
      const asc = table.getAttribute("data-sort") !== "asc";
      rows.sort((a, b) => {
        const x = a.cells[colIndex].innerText.toLowerCase();
        const y = b.cells[colIndex].innerText.toLowerCase();
        return asc ? x.localeCompare(y) : y.localeCompare(x);
      });
      rows.forEach(row => table.tBodies[0].appendChild(row));
      table.setAttribute("data-sort", asc ? "asc" : "desc");
    }

    window.onload = loadTable;
  </script>
</body>

</html>
