# File: docker-compose-fix.yml
version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: gabani_bots_db
    environment:
      POSTGRES_DB: gabani_bots
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gabani123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./fix_missing_bots.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gabani_network
  bot_fixer:
    build: 
      context: .
      dockerfile: Dockerfile.fixer
    container_name: gabani_bot_fixer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gabani_bots
      DB_USER: postgres
      DB_PASSWORD: gabani123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gabani_network
    restart: on-failure:3
  bots_app:
    build: .
    container_name: gabani_bots_app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_DB_HOST: postgres
      DATABASE_URL: postgresql://postgres:gabani123@postgres:5432/gabani_bots
    depends_on:
      postgres:
        condition: service_healthy
      bot_fixer:
        condition: service_completed_successfully
    networks:
      - gabani_network
volumes:
  postgres_data:
networks:
  gabani_network:
    driver: bridge
