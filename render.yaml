services:
  # Backend API Service
  - type: web
    name: gts-backend
    runtime: python
    plan: starter
    region: oregon
    rootDir: .
    branch: master
    autoDeployTrigger: "off"
    domains:
      - api.gtsdispatcher.com

    # Optimize build command to save time
    buildCommand: |
      echo "🚀 Starting optimized build..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      echo "✅ Build completed"

    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz

    # Filter files that trigger new builds
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - render.yaml
        - alembic.ini
      ignoredPaths:
        - frontend/**
        - docs/**
        - tests/**
        - *.md
        - .github/**

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://www.gtsdispatcher.com
      - key: ADMIN_URL
        value: https://www.gtsdispatcher.com/admin
      - key: INTERNAL_BASE_URL
        value: https://api.gtsdispatcher.com
      - key: API_BASE_URL
        value: https://api.gtsdispatcher.com

  # Frontend Static Site
  - type: web
    name: gts-frontend
    runtime: static
    plan: starter
    region: oregon
    rootDir: frontend
    branch: master
    autoDeployTrigger: "off"
    domains:
      - www.gtsdispatcher.com

    # Optimize frontend build
    buildCommand: |
      echo "🎨 Building frontend..."
      npm ci
      npm run build
      echo "✅ Frontend build completed"

    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Filter files for frontend only
    buildFilter:
      paths:
        - frontend/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - backend/**
        - docs/**
        - tests/**
        - *.md

    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_ENVIRONMENT
        value: production
      - key: VITE_APP_URL
        value: https://www.gtsdispatcher.com
      - key: VITE_APP_DOMAIN
        value: https://www.gtsdispatcher.com
      - key: VITE_FRONTEND_BASE_URL
        value: https://www.gtsdispatcher.com
      - key: VITE_API_BASE_URL
        value: https://api.gtsdispatcher.com
      - key: VITE_API_URL
        value: https://api.gtsdispatcher.com
      - key: VITE_WS_BASE_URL
        value: wss://api.gtsdispatcher.com/api/v1/ws
