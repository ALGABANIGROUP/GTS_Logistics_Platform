services:
  - type: web
    name: GTS-Logistics-API
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ping
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
