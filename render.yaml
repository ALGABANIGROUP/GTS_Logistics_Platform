services:
  # Backend API Service
  - type: web
    name: gts-backend
    runtime: python
    plan: starter
    region: oregon
    rootDir: .
    branch: main
    autoDeploy: false  # Disable auto-deploy to save minutes

    # Optimize build command to save time
    buildCommand: |
      echo "🚀 Starting optimized build..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      echo "✅ Build completed"

    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ping

    # Filter files that trigger new builds
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - render.yaml
        - alembic.ini
      ignoredPaths:
        - frontend/**
        - docs/**
        - tests/**
        - *.md
        - .github/**

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production

  # Frontend Static Site
  - type: web
    name: gts-frontend
    runtime: static
    plan: starter
    region: oregon
    rootDir: frontend
    branch: main
    autoDeploy: false  # Disable auto-deploy

    # Optimize frontend build
    buildCommand: |
      echo "🎨 Building frontend..."
      npm ci --only=production
      npm run build
      echo "✅ Frontend build completed"

    staticPublishPath: ./dist

    # Filter files for frontend only
    buildFilter:
      paths:
        - frontend/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - backend/**
        - docs/**
        - tests/**
        - *.md

    envVars:
      - key: NODE_VERSION
        value: 18.17.0
