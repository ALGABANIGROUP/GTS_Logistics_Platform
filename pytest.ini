[pytest]
pythonpath = .
testpaths = backend/tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
norecursedirs = .venv .git __pycache__ backend/.venv frontend/node_modules .pytest_cache
markers =
    slow: Tests that take a long time to run
    integration: Integration tests that may require external services
    unit: Fast unit tests
    smoke: Basic smoke tests
    auth: Authentication related tests
    bot: Bot related tests
    finance: Finance related tests
filterwarnings =
    ignore:.*SwigPy.*:DeprecationWarning
    ignore:.*swigvarlink.*:DeprecationWarning
