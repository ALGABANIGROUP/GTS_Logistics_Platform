name: Arabic Lint

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci

      - name: Run Arabic code lint
        run: |
          npm run lint:arabic
