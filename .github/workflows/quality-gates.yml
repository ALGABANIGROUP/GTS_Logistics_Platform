name: Quality Gates

on:
  pull_request:
    branches: [main, master, develop, production]
  push:
    branches: [main, develop, production]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run backend tests
        run: pytest backend/tests -q --maxfail=1

  frontend-quality:
    name: Frontend Lint and Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend coverage with thresholds
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

  smoke-http:
    name: Smoke HTTP Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install uvicorn

      - name: Start backend
        run: |
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null; then
              echo "Backend is up"
              break
            fi
            sleep 2
          done

      - name: Smoke test backend APIs
        run: |
          curl -fS http://127.0.0.1:8000/healthz
          curl -fS http://127.0.0.1:8000/api/v1/system/readiness
          curl -fS http://127.0.0.1:8000/docs

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend preview
        working-directory: frontend
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              echo "Frontend is up"
              break
            fi
            sleep 2
          done

      - name: Smoke test frontend pages
        run: |
          curl -fS http://127.0.0.1:4173/
          curl -fS http://127.0.0.1:4173/payments/123

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            backend.log
            frontend/frontend.log
          if-no-files-found: ignore
