title = "Gitleaks Config"

[allowlist]
description = "Allow known test placeholders and documentation examples"
paths = [
  '''_archive/INTEGRATION_TESTING_GUIDE\.md''',
  '''_archive/PHASE_.*_COMPLETION_SUMMARY\.md''',
  '''backend/tests/.*\.py''',
  '''tests/.*\.py''',
  '''frontend/GoogleMapFeatures\.js''',
  '''database_orchestrator\.py''',
  '''docs/INCIDENT_RESPONSE\.md''',
  '''create_gts_scaffold\.ps1''',
]

regexes = [
  '''sk_test_51234567890''',
  '''pk_test_51234567890''',
  '''erp_api_key_12345''',
  '''YOUR_TOKEN''',
  '''YOUR_API_KEY''',
  '''duplicate-key-123''',
  '''-----BEGIN PRIVATE KEY-----\\n\.\.\.\\n-----END PRIVATE KEY-----''',
]
